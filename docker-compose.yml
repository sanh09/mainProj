version: "3.9"

services:
  backend:
    build:
      context: ./backend          # backend 폴더 기준으로 Dockerfile 빌드
      dockerfile: Dockerfile
    container_name: cansi-backend
    ports:
      - "8000:8000"
    command: ["bash", "-lc", "conda run -n appenv uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    env_file:
        - ./.env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SCHEMA: ${DB_SCHEMA:-public}
      DB_SSLMODE: ${DB_SSLMODE:-require}
    volumes:
      - ./backend:/app            # 개발용: 코드 변경 바로 반영
